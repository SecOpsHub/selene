---
# Selene — Wazuh Configuration Playbook
# Runs on the EC2 instance itself (localhost, no remote SSH needed).
# Called by UserData on every boot — fully idempotent.
# Spec: docs/components/SPEC-006-ansible.md
#
# Variables passed via --extra-vars from UserData (all sourced from SSM):
#   opensearch_endpoint  — OpenSearch VPC hostname
#   cloudtrail_bucket    — logs.infillion.com
#   cloudtrail_org_id    — o-z70v8p3t14
#   only_logs_after      — YYYY-MMM-DD start date for CloudTrail ingestion
#
# opensearch_admin_password is read directly from SSM SecureString
# inside the playbook — never passed as a CLI argument.

- hosts: localhost
  connection: local
  become: yes

  vars:
    wazuh_major_version: "4"
    wazuh_install_marker: /var/ossec/bin/wazuh-control

  # ── Handlers ────────────────────────────────────────────────
  # Only fire when a task reports 'changed'. This enforces idempotency:
  # services only restart when their config actually changed.
  handlers:

    - name: restart wazuh-manager
      systemd:
        name: wazuh-manager
        state: restarted
        daemon_reload: yes

    - name: restart filebeat
      systemd:
        name: filebeat
        state: restarted
        daemon_reload: yes

    - name: restart wazuh-dashboard
      systemd:
        name: wazuh-dashboard
        state: restarted
        daemon_reload: yes

    - name: restart selene-shipper
      systemd:
        name: selene-shipper
        state: restarted
        daemon_reload: yes

  tasks:

    # ────────────────────────────────────────────────────────────
    # SECTION 1: Install Wazuh (idempotent)
    # Checks for existing installation before doing anything.
    # Install takes 5-15 minutes on first boot. Skipped on all
    # subsequent boots.
    # ────────────────────────────────────────────────────────────

    - name: "[install] Check if Wazuh is already installed"
      stat:
        path: "{{ wazuh_install_marker }}"
      register: wazuh_installed

    - name: "[install] Resolve latest Wazuh {{ wazuh_major_version }}.x version"
      shell: |
        curl -s https://api.github.com/repos/wazuh/wazuh/releases \
          | python3 -c "
        import sys, json
        releases = json.load(sys.stdin)
        versions = [r['tag_name'].lstrip('v') for r in releases
                    if r['tag_name'].startswith('v{{ wazuh_major_version }}.')
                    and not r['prerelease']]
        print(versions[0])
        "
      register: wazuh_latest_version
      when: not wazuh_installed.stat.exists

    - name: "[install] Set Wazuh minor version fact"
      set_fact:
        wazuh_minor_version: "{{ wazuh_latest_version.stdout.split('.')[:2] | join('.') }}"
      when: not wazuh_installed.stat.exists

    - name: "[install] Show Wazuh version being installed"
      debug:
        msg: "Installing Wazuh {{ wazuh_latest_version.stdout }} ({{ wazuh_minor_version }}.x)"
      when: not wazuh_installed.stat.exists

    - name: "[install] Download Wazuh install script ({{ wazuh_major_version }}.x latest)"
      get_url:
        url: "https://packages.wazuh.com/{{ wazuh_minor_version }}/wazuh-install.sh"
        dest: /tmp/wazuh-install.sh
        mode: '0755'
        timeout: 60
      when: not wazuh_installed.stat.exists

    - name: "[install] Download Wazuh config.yml"
      get_url:
        url: "https://packages.wazuh.com/{{ wazuh_minor_version }}/config.yml"
        dest: /tmp/config.yml
        mode: '0644'
        timeout: 60
      when: not wazuh_installed.stat.exists

    - name: "[install] Configure config.yml for all-in-one (127.0.0.1)"
      copy:
        dest: /tmp/config.yml
        mode: '0644'
        content: |
          nodes:
            indexer:
              - name: node-1
                ip: "127.0.0.1"
            server:
              - name: wazuh-1
                ip: "127.0.0.1"
            dashboard:
              - name: dashboard
                ip: "127.0.0.1"
      when: not wazuh_installed.stat.exists

    - name: "[install] Run Wazuh all-in-one installer (takes 5-15 min)"
      command:
        cmd: bash /tmp/wazuh-install.sh -a -i
        creates: "{{ wazuh_install_marker }}"
      async: 900
      poll: 30
      when: not wazuh_installed.stat.exists

    - name: "[install] Verify install succeeded"
      stat:
        path: "{{ wazuh_install_marker }}"
      register: wazuh_post_install
      when: not wazuh_installed.stat.exists
      failed_when:
        - not wazuh_installed.stat.exists
        - not wazuh_post_install.stat.exists

    - name: "[install] Read generated Wazuh indexer admin password"
      shell: |
        grep -A1 "indexer_username: 'admin'" \
          /usr/share/wazuh-install-files/wazuh-passwords.txt \
          | grep indexer_password \
          | sed "s/.*indexer_password: '\\(.*\\)'/\\1/"
      register: wazuh_indexer_password
      when: not wazuh_installed.stat.exists
      no_log: true

    - name: "[install] Store Wazuh indexer password in SSM SecureString"
      shell: |
        aws ssm put-parameter \
          --name /selene/wazuh_indexer_admin_password \
          --value "{{ wazuh_indexer_password.stdout }}" \
          --type SecureString \
          --region us-east-1 \
          --overwrite
      when:
        - not wazuh_installed.stat.exists
        - wazuh_indexer_password.stdout is defined
        - wazuh_indexer_password.stdout | length > 0
      no_log: true

    - name: "[install] Clean up install files"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/wazuh-install.sh
        - /tmp/config.yml
      when: not wazuh_installed.stat.exists

    # ────────────────────────────────────────────────────────────
    # SECTION 2: Configure ossec.conf
    # Renders from template using SSM-sourced variables.
    # Restarts wazuh-manager only if content changed.
    # ────────────────────────────────────────────────────────────

    - name: "[config] Deploy ossec.conf from template"
      template:
        src: "{{ playbook_dir }}/../wazuh/templates/ossec.conf.j2"
        dest: /var/ossec/etc/ossec.conf
        owner: root
        group: wazuh
        mode: '0640'
      notify: restart wazuh-manager

    # ────────────────────────────────────────────────────────────
    # SECTION 3: Deploy custom rules and suppressions
    # Source of truth is Git. Never edit these on the server.
    # Restarts wazuh-manager only if files changed.
    # ────────────────────────────────────────────────────────────

    - name: "[rules] Ensure custom rules directory exists"
      file:
        path: /var/ossec/etc/rules
        state: directory
        owner: root
        group: wazuh
        mode: '0750'

    - name: "[rules] Deploy local_rules.xml"
      copy:
        src: "{{ playbook_dir }}/../wazuh/rules/local_rules.xml"
        dest: /var/ossec/etc/rules/local_rules.xml
        owner: root
        group: wazuh
        mode: '0640'
      notify: restart wazuh-manager

    - name: "[rules] Deploy local_overrides.xml (suppressions)"
      copy:
        src: "{{ playbook_dir }}/../wazuh/suppressions/local_overrides.xml"
        dest: /var/ossec/etc/local_overrides.xml
        owner: root
        group: wazuh
        mode: '0640'
      notify: restart wazuh-manager

    # ────────────────────────────────────────────────────────────
    # SECTION 4: Configure Amazon OpenSearch connection
    # Reads admin password directly from SSM SecureString — never
    # passed on the CLI so it does not appear in process list or logs.
    # Updates filebeat (alert shipper) and wazuh-dashboard.
    # Stops local wazuh-indexer — not needed with external OpenSearch.
    # ────────────────────────────────────────────────────────────

    - name: "[indexer] Read OpenSearch admin password from SSM SecureString"
      shell: |
        aws ssm get-parameter \
          --name /selene/opensearch_admin_password \
          --with-decryption \
          --query Parameter.Value \
          --output text \
          --region us-east-1
      register: opensearch_password_result
      no_log: true

    - name: "[indexer] Set opensearch_admin_password fact"
      set_fact:
        opensearch_admin_password: "{{ opensearch_password_result.stdout }}"
      no_log: true

    - name: "[indexer] Configure filebeat to send to Amazon OpenSearch"
      template:
        src: "{{ playbook_dir }}/templates/filebeat.yml.j2"
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0600'
      notify: restart filebeat

    - name: "[indexer] Configure wazuh-dashboard to connect to Amazon OpenSearch"
      template:
        src: "{{ playbook_dir }}/templates/opensearch_dashboards.yml.j2"
        dest: /etc/wazuh-dashboard/opensearch_dashboards.yml
        owner: wazuh-dashboard
        group: wazuh-dashboard
        mode: '0600'
      notify: restart wazuh-dashboard

    - name: "[indexer] Stop and disable local wazuh-indexer (NOT disabled - needed for dashboard)"
      systemd:
        name: wazuh-indexer
        state: started
        enabled: true
      failed_when: false

    # ────────────────────────────────────────────────────────────
    # SECTION 5: Ensure core services are running
    # Note: filebeat is DISABLED - replaced by selene-shipper
    # wazuh-indexer runs locally (dashboard reads from it)
    # ────────────────────────────────────────────────────────────

    - name: "[services] Ensure wazuh-manager is enabled and started"
      systemd:
        name: wazuh-manager
        state: started
        enabled: true
        daemon_reload: yes

    - name: "[services] Disable filebeat (replaced by selene-shipper)"
      systemd:
        name: filebeat
        state: stopped
        enabled: false
      failed_when: false

    - name: "[services] Ensure wazuh-indexer is enabled and started"
      systemd:
        name: wazuh-indexer
        state: started
        enabled: true
        daemon_reload: yes

    - name: "[services] Ensure wazuh-dashboard is enabled and started"
      systemd:
        name: wazuh-dashboard
        state: started
        enabled: true
        daemon_reload: yes

    - name: "[services] Wait for wazuh-manager to write PID file"
      wait_for:
        path: /var/ossec/var/run/wazuh-execd.pid
        state: present
        timeout: 60
      ignore_errors: true

    # ────────────────────────────────────────────────────────────
    # SECTION 6: Deploy selene-shipper
    # Replaces filebeat for AL2023 compatibility.
    # Replicates all official Wazuh filebeat pipeline.json transforms:
    #   - @timestamp normalization
    #   - data.aws.accountId, data.aws.region aliases
    #   - GeoLocation via local GeoLite2-City.mmdb
    # ────────────────────────────────────────────────────────────

    - name: "[shipper] Ensure python3-pip is installed"
      dnf:
        name: python3-pip
        state: present

    - name: "[shipper] Install geoip2 Python library"
      pip:
        name: geoip2
        state: present

    - name: "[shipper] Read wazuh-indexer admin password from SSM SecureString"
      shell: |
        aws ssm get-parameter \
          --name /selene/wazuh_indexer_admin_password \
          --with-decryption \
          --query Parameter.Value \
          --output text \
          --region us-east-1
      register: indexer_password_result
      no_log: true

    - name: "[shipper] Deploy selene-shipper.py"
      copy:
        src: "{{ playbook_dir }}/files/selene-shipper.py"
        dest: /usr/local/bin/selene-shipper.py
        owner: root
        group: root
        mode: '0755'
      notify: restart selene-shipper

    - name: "[shipper] Set indexer password in selene-shipper.py"
      replace:
        path: /usr/local/bin/selene-shipper.py
        regexp: '__INDEXER_PASSWORD__'
        replace: "{{ indexer_password_result.stdout }}"
      no_log: true
      notify: restart selene-shipper

    - name: "[shipper] Deploy selene-shipper systemd service"
      copy:
        src: "{{ playbook_dir }}/files/selene-shipper.service"
        dest: /etc/systemd/system/selene-shipper.service
        owner: root
        group: root
        mode: '0644'
      notify: restart selene-shipper

    - name: "[shipper] Ensure /var/lib/selene-shipper directory exists"
      file:
        path: /var/lib/selene-shipper
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: "[shipper] Enable and start selene-shipper"
      systemd:
        name: selene-shipper
        state: started
        enabled: true
        daemon_reload: yes

    - name: "[services] Report final service status"
      command: systemctl is-active {{ item }}
      register: svc_status
      changed_when: false
      failed_when: false
      loop:
        - wazuh-manager
        - wazuh-indexer
        - wazuh-dashboard
        - selene-shipper

    - name: "[services] Print service status"
      debug:
        msg: "{{ item.item }}: {{ item.stdout }}"
      loop: "{{ svc_status.results }}"

